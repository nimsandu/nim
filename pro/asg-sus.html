<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illuminating the Margins — Interactive Overview</title>
<style>
@font-face{font-family:'UberMove';font-weight:300;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Light.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:400;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Regular.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:500;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Medium.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:700;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Bold.woff2') format('woff2')}
</style>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --f:'UberMove','Manrope',sans-serif;
  --fm:'Share Tech Mono','Courier New',monospace;
  --bg:#F8F6F0;
  --surface:#FFFFFF;
  --t1:#1A1916;
  --t2:rgba(26,25,22,0.58);
  --t3:rgba(26,25,22,0.32);
  --border:rgba(26,25,22,0.1);
  --panel-w:420px;
}
body{font-family:var(--f);background:var(--bg);color:var(--t1);
  background-image:radial-gradient(circle,rgba(26,25,22,0.12) 1px,transparent 1px);
  background-size:26px 26px;}

/* ── Header ─────────────────────────────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:80;height:52px;
  background:rgba(248,246,240,0.94);border-bottom:1px solid rgba(26,25,22,0.1);
  backdrop-filter:blur(14px);display:flex;align-items:center;padding:0 24px;gap:12px;
}
.hl{font-size:12.5px;font-weight:700;letter-spacing:-0.02em;color:var(--t1);white-space:nowrap}
.hd{width:1px;height:15px;background:rgba(26,25,22,0.15);flex-shrink:0}
.hs{font-size:10px;color:var(--t3);font-family:var(--fm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsp{flex:1}
.hbtn{
  font-family:var(--f);font-size:11px;font-weight:600;cursor:pointer;
  padding:6px 15px;border-radius:99px;white-space:nowrap;
  border:1.5px solid rgba(26,25,22,0.22);background:rgba(26,25,22,0.04);color:var(--t1);
  display:flex;align-items:center;gap:6px;
  transition:background .18s,color .18s;user-select:none;
}
.hbtn:hover{background:var(--t1);color:#fff}
#tog-ico{transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
#tog-ico.x{transform:rotate(45deg)}

/* ── Map area ────────────────────────────────────────────────────────────── */
#area{
  position:fixed;top:52px;left:0;right:0;bottom:44px;
  overflow:hidden;transition:right .4s cubic-bezier(.25,.8,.25,1);
  cursor:grab;user-select:none;
}
#area.panel-open{right:var(--panel-w)}
#area.dragging{cursor:grabbing}
#cv{
  position:absolute;width:1600px;height:840px;
  transform-origin:0 0;will-change:transform;
}
#sv{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1;}

/* ── Zoom controls ───────────────────────────────────────────────────────── */
#zoom-controls{
  position:fixed;bottom:58px;left:50%;transform:translateX(-50%);
  z-index:90;display:flex;align-items:center;gap:0;
  background:rgba(248,246,240,0.96);border:1px solid rgba(26,25,22,0.12);
  border-radius:99px;backdrop-filter:blur(14px);
  box-shadow:0 2px 12px rgba(26,25,22,0.1);overflow:hidden;
}
.zc-btn{
  font-family:var(--f);font-size:15px;font-weight:400;cursor:pointer;
  width:34px;height:32px;display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;color:var(--t2);
  transition:background .14s,color .14s;line-height:1;
}
.zc-btn:hover{background:rgba(26,25,22,0.07);color:var(--t1)}
.zc-btn:active{background:rgba(26,25,22,0.13)}
.zc-sep{width:1px;height:16px;background:rgba(26,25,22,0.1);flex-shrink:0}
#zoom-label{
  font-family:var(--fm);font-size:10px;color:var(--t3);
  padding:0 10px;min-width:44px;text-align:center;cursor:default;
  letter-spacing:0.04em;
}
.zc-fit-btn{
  font-family:var(--fm);font-size:9px;font-weight:600;cursor:pointer;
  padding:0 12px;height:32px;display:flex;align-items:center;
  border:none;background:transparent;color:var(--t3);letter-spacing:0.06em;
  text-transform:uppercase;transition:background .14s,color .14s;
}
.zc-fit-btn:hover{background:rgba(26,25,22,0.07);color:var(--t1)}

/* ── Nodes ───────────────────────────────────────────────────────────────── */
.node{position:absolute;transform:translate(-50%,-50%);z-index:10;}

/* Center */
.nc .ring{
  width:152px;height:152px;border-radius:50%;background:var(--t1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
  box-shadow:0 0 0 9px rgba(26,25,22,0.05),0 0 0 1px rgba(26,25,22,0.12),0 8px 32px rgba(26,25,22,0.18);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;cursor:pointer;position:relative;
}
.nc:hover .ring,.nc.active .ring{transform:scale(1.06);box-shadow:0 0 0 12px rgba(26,25,22,0.08),0 0 0 1px rgba(26,25,22,0.2),0 12px 40px rgba(26,25,22,0.25)}
.nc .ring::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);pointer-events:none;}
.nc-lbl{font-size:12px;font-weight:700;color:#fff;line-height:1.35;letter-spacing:-0.02em}
.nc-sub{font-size:7.5px;font-weight:500;color:rgba(255,255,255,0.38);margin-top:8px;text-transform:uppercase;letter-spacing:0.11em;font-family:var(--fm)}

/* Branch */
.nb{cursor:pointer}
.nb .card{
  width:150px;background:var(--surface);padding:11px 12px 12px 15px;
  position:relative;
  box-shadow:0 1px 3px rgba(26,25,22,0.07),0 4px 16px rgba(26,25,22,0.06);
  transition:box-shadow .2s,transform .25s cubic-bezier(.34,1.56,.64,1);
}
.nb:hover .card,.nb.active .card{
  transform:scale(1.05);
  box-shadow:0 0 0 2px var(--acc),0 6px 24px rgba(26,25,22,0.14);
}
.nb .card::before{content:'';position:absolute;top:-2px;left:-2px;width:9px;height:9px;border-top:1.5px solid var(--acc);border-left:1.5px solid var(--acc)}
.nb .card::after{content:'';position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-top:1.5px solid var(--acc);border-right:1.5px solid var(--acc)}
.c3{position:absolute;bottom:-2px;left:-2px;width:9px;height:9px;border-bottom:1.5px solid var(--acc);border-left:1.5px solid var(--acc)}
.c4{position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;border-bottom:1.5px solid var(--acc);border-right:1.5px solid var(--acc)}
.nb-cat{font-size:7.5px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:0.11em;margin-bottom:5px;font-family:var(--fm)}
.nb-name{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-0.02em;line-height:1.2;margin-bottom:4px}
.nb-desc{font-size:9.5px;font-weight:400;color:var(--t2);line-height:1.46}
.click-hint{font-size:7px;font-family:var(--fm);color:var(--acc);opacity:0;margin-top:5px;letter-spacing:0.08em;transition:opacity .2s;text-transform:uppercase}
.nb:hover .click-hint{opacity:0.7}

/* Sub */
.ns{cursor:pointer}
.ns .card{
  width:126px;background:var(--surface);padding:7px 9px 8px 11px;
  position:relative;
  box-shadow:0 1px 2px rgba(26,25,22,0.06),0 2px 8px rgba(26,25,22,0.04);
  transition:box-shadow .2s,transform .25s cubic-bezier(.34,1.56,.64,1);
}
.ns:hover .card,.ns.active .card{
  transform:scale(1.06);
  box-shadow:0 0 0 1.5px var(--acc),0 4px 14px rgba(26,25,22,0.12);
}
.ns .card::before{content:'';position:absolute;top:-2px;left:-2px;width:7px;height:7px;border-top:1px solid var(--acc);border-left:1px solid var(--acc);opacity:.7}
.ns .card::after{content:'';position:absolute;bottom:-2px;right:-2px;width:7px;height:7px;border-bottom:1px solid var(--acc);border-right:1px solid var(--acc);opacity:.7}
.ns-name{font-size:9.5px;font-weight:700;color:var(--t1);line-height:1.3}
.ns-det{font-size:8px;color:var(--t3);line-height:1.35;margin-top:2px;font-family:var(--fm)}

/* ── Detail Panel ────────────────────────────────────────────────────────── */
#panel{
  position:fixed;top:52px;right:0;bottom:44px;z-index:90;
  width:var(--panel-w);
  background:var(--surface);
  border-left:1px solid rgba(26,25,22,0.1);
  box-shadow:-8px 0 40px rgba(26,25,22,0.08);
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.25,.8,.25,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#panel.open{transform:translateX(0)}

#panel-head{
  padding:20px 22px 18px;
  border-bottom:1px solid rgba(26,25,22,0.07);
  flex-shrink:0;position:relative;
}
#panel-cat{
  font-size:8px;font-weight:600;font-family:var(--fm);
  text-transform:uppercase;letter-spacing:0.13em;
  margin-bottom:8px;opacity:0.7;
}
#panel-title{
  font-size:20px;font-weight:700;letter-spacing:-0.025em;
  line-height:1.2;margin-bottom:6px;
}
#panel-subtitle{font-size:11px;color:var(--t2);line-height:1.5}
#panel-close{
  position:absolute;top:18px;right:18px;
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(26,25,22,0.12);background:rgba(26,25,22,0.03);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;color:var(--t2);font-size:14px;line-height:1;
}
#panel-close:hover{background:rgba(26,25,22,0.08);color:var(--t1)}

#panel-accent{height:3px;flex-shrink:0}

#panel-body{
  flex:1;overflow-y:auto;padding:20px 22px 28px;
  scrollbar-width:thin;scrollbar-color:rgba(26,25,22,0.12) transparent;
}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-thumb{background:rgba(26,25,22,0.12);border-radius:2px}

/* Panel content blocks */
.pb-section{margin-bottom:22px}
.pb-label{
  font-size:7.5px;font-weight:600;font-family:var(--fm);
  text-transform:uppercase;letter-spacing:0.13em;
  color:var(--t3);margin-bottom:9px;
  display:flex;align-items:center;gap:7px;
}
.pb-label::after{content:'';flex:1;height:1px;background:rgba(26,25,22,0.08)}
.pb-text{font-size:12px;line-height:1.72;color:var(--t2);font-weight:400}
.pb-text strong{color:var(--t1);font-weight:600}
.pb-quote{
  margin:14px 0;padding:12px 15px;
  border-left:2.5px solid var(--panel-acc);
  background:rgba(26,25,22,0.025);border-radius:0 6px 6px 0;
  font-size:11.5px;line-height:1.65;color:var(--t2);font-style:italic;
}
.pb-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pb-chip{
  font-size:9.5px;font-weight:500;font-family:var(--fm);
  padding:4px 10px;border-radius:4px;
  border:1px solid var(--panel-acc);
  color:var(--panel-acc);
  background:transparent;
  letter-spacing:0.03em;
}
.pb-stat{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;margin-top:8px;
  background:rgba(26,25,22,0.025);border-radius:6px;
  border:1px solid rgba(26,25,22,0.07);
}
.pb-stat-num{font-size:26px;font-weight:700;line-height:1;flex-shrink:0;letter-spacing:-0.03em}
.pb-stat-txt{font-size:10.5px;line-height:1.55;color:var(--t2);margin-top:2px}
.pb-bullets{list-style:none;margin-top:8px}
.pb-bullets li{
  font-size:11.5px;line-height:1.65;color:var(--t2);
  padding:5px 0 5px 16px;position:relative;
  border-bottom:1px solid rgba(26,25,22,0.05);
}
.pb-bullets li:last-child{border:none}
.pb-bullets li::before{
  content:'—';position:absolute;left:0;
  color:var(--panel-acc);font-weight:700;font-size:10px;top:6px;
}
.pb-ref{
  font-size:9px;line-height:1.6;color:var(--t3);
  font-family:var(--fm);margin-top:5px;
  padding:10px 12px;background:rgba(26,25,22,0.025);border-radius:5px;
}
.pb-subnav{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.pb-subpill{
  font-size:9.5px;font-weight:600;padding:5px 12px;border-radius:5px;
  background:rgba(26,25,22,0.04);border:1px solid rgba(26,25,22,0.1);
  cursor:pointer;color:var(--t2);transition:all .15s;font-family:var(--fm);
  letter-spacing:0.03em;
}
.pb-subpill:hover{background:var(--panel-acc);border-color:var(--panel-acc);color:#fff}

/* ── Toggle / sub toggle ─────────────────────────────────────────────────── */
.ns,.sub-el{transition:opacity .35s ease,transform .35s cubic-bezier(.34,1.56,.64,1)}
.ns.off{opacity:0!important;pointer-events:none;transform:translate(-50%,-50%) scale(0.78)!important}
.sub-el.off{opacity:0!important}

/* ── Entrance animations ─────────────────────────────────────────────────── */
@keyframes pop{from{opacity:0;transform:translate(-50%,-50%) scale(0.6)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.pop{opacity:0;animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
@keyframes dl{from{stroke-dashoffset:var(--d)}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .32s ease both}

/* ── Legend ──────────────────────────────────────────────────────────────── */
#leg{
  position:fixed;bottom:0;left:0;right:0;z-index:80;height:44px;
  background:rgba(248,246,240,0.94);border-top:1px solid rgba(26,25,22,0.1);
  backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;gap:20px;padding:0 20px;
  transition:right .4s cubic-bezier(.25,.8,.25,1);
}
.li{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:500;color:var(--t3);font-family:var(--fm);letter-spacing:0.04em}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <span class="hl">Illuminating the Margins</span>
  <div class="hd"></div>
  <span class="hs">SCHEMATIC OVERVIEW · GROUP 19 · CE1913 · Y1S1–2026 · CLICK ANY NODE TO EXPLORE</span>
  <div class="hsp"></div>
  <button class="hbtn" onclick="toggle()">
    <svg id="tog-ico" width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="5.5" y1="1" x2="5.5" y2="10"/><line x1="1" y1="5.5" x2="10" y2="5.5"/>
    </svg>
    <span id="tog-lbl">Hide Details</span>
  </button>
</div>

<!-- MAP -->
<div id="area">
  <div id="cv"><svg id="sv"></svg></div>
</div>

<!-- DETAIL PANEL -->
<div id="panel">
  <div id="panel-accent"></div>
  <div id="panel-head">
    <div id="panel-cat"></div>
    <div id="panel-title"></div>
    <div id="panel-subtitle"></div>
    <div id="panel-close" onclick="closePanel()">✕</div>
  </div>
  <div id="panel-body"></div>
</div>

<!-- ZOOM CONTROLS -->
<div id="zoom-controls">
  <button class="zc-btn" onclick="zoomStep(1.25)" title="Zoom in">+</button>
  <div class="zc-sep"></div>
  <span id="zoom-label">100%</span>
  <div class="zc-sep"></div>
  <button class="zc-btn" onclick="zoomStep(0.8)" title="Zoom out">−</button>
  <div class="zc-sep"></div>
  <button class="zc-fit-btn" onclick="resetView()" title="Reset view">FIT</button>
</div>

<!-- LEGEND -->
<div id="leg">
  <div class="li"><div class="ld" style="background:#2A6FD4"></div>SDG ALIGNMENT</div>
  <div class="li"><div class="ld" style="background:#C43858"></div>PEOPLE</div>
  <div class="li"><div class="ld" style="background:#B07A10"></div>ECONOMY</div>
  <div class="li"><div class="ld" style="background:#1E8A4A"></div>ENVIRONMENT</div>
  <div class="li"><div class="ld" style="background:#7040C8"></div>PROJECT DESIGN</div>
  <div class="li"><div class="ld" style="background:#0E8878"></div>KEY BENEFITS</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONTENT DATABASE
// ═══════════════════════════════════════════════════════════════════════════════
const CONTENT = {
  center:{
    cat:'PROJECT OVERVIEW', title:'Solar-Powered Street Lighting',
    subtitle:'A sustainable, community-led off-grid lighting initiative for rural Sri Lanka.',
    color:'#1A1916',
    sections:[
      {label:'The Core Idea', text:'Numerous remote regions in Sri Lanka lack connections to the national electrical grid — and even where the grid expands, <strong>street lighting is routinely omitted</strong>. This project proposes deploying off-grid solar LED street lights, maintained by the communities themselves, as an immediate and affordable solution.'},
      {label:'The Problem in One Line', quote:'"It\'s 7 PM. The sun has set. The street outside? Pitch black. No lights. Nothing. This is not a rare situation — it is everyday life for millions across rural Sri Lanka."'},
      {label:'Why This Matters', bullets:['Women face harassment and assault on unlit roads','Children abandon studies — they cannot read or commute after dark','Farmers and vendors lose income as businesses must close at sunset','Elderly and sick cannot safely access healthcare at night','Road accident rates are significantly higher on unlit roads']},
      {label:'Our Solution', text:'Solar LED street lights installed by community members along key village roads. No grid connection required. Powered entirely by Sri Lanka\'s abundant solar irradiance. Batteries store energy for all-night illumination. Estimated <strong>50% reduction in household fuel costs</strong> versus kerosene alternatives.'},
      {label:'Key Statistics', stats:[{n:'40%+',t:'of rural Sri Lanka lacks adequate street lighting (IEA, 2022)'},{n:'2×',t:'higher road accident risk on unlit rural roads at night (WHO, 2021)'},{n:'50%',t:'household fuel cost savings estimated from replacing kerosene with solar LEDs'}]},
      {label:'Navigate the Project', text:'Click any node on the map to read about SDG alignment, stakeholder impacts, project design, and evidence-backed benefits. Use the sub-nodes for topic-level detail.'},
      {label:'Source', ref:'IEA (2022) World Energy Outlook. WHO (2021) Road Traffic Injuries. United Nations (2015) 2030 Agenda for Sustainable Development.'}
    ]
  },

  sdg:{
    cat:'SUSTAINABILITY', title:'SDG Alignment',
    subtitle:'This project directly addresses three United Nations Sustainable Development Goals under the 2030 Agenda.',
    color:'#2A6FD4',
    sections:[
      {label:'Overview', text:'The UN 2030 Agenda for Sustainable Development provides the global framework our project operates within. Solar-powered street lighting in rural Sri Lanka advances <strong>SDG 7, SDG 11, and SDG 13</strong> simultaneously — making it one of the most multi-dimensional interventions available at low cost.'},
      {label:'Sub-topics', subnav:['SDG 7 — Clean Energy','SDG 11 — Sustainable Communities','SDG 13 — Climate Action']},
      {label:'Why Three SDGs?', bullets:['Energy access (SDG 7) is the foundation — without light, nothing else improves','Community safety and mobility (SDG 11) are direct outcomes of street lighting','Zero-emission operation directly supports climate commitments (SDG 13)','The three are deeply interdependent in rural off-grid contexts']},
      {label:'Source', ref:'United Nations (2015). Transforming our world: the 2030 Agenda for Sustainable Development. Available at: https://sdgs.un.org/2030agenda'}
    ]
  },
  sdg7:{
    cat:'SDG 7 · CLEAN ENERGY', title:'Affordable & Clean Energy',
    subtitle:'Target 7.1: Universal energy access. Target 7.2: Increase the share of renewable energy.',
    color:'#2A6FD4',
    sections:[
      {label:'Relevance', text:'Sri Lanka has committed to national renewable energy targets, yet rural communities remain dependent on hazardous, expensive kerosene lamps and disposable batteries. Our project replaces fossil-fuel-based lighting with <strong>clean, off-grid solar power</strong> at zero operational carbon cost.'},
      {label:'Targets Addressed', bullets:['Target 7.1 — Universal access to affordable, reliable, and modern energy services','Target 7.2 — Substantially increase the share of renewable energy in the global energy mix']},
      {label:'Impact', text:'Each solar LED unit eliminates the need for kerosene combustion in that household\'s vicinity. With 50 units installed per village, this represents a measurable shift in the community\'s energy profile toward clean renewables.'},
      {label:'Source', ref:'IEA (2022) World Energy Outlook 2022: Special Focus on Energy Access. Paris: IEA/OECD. | United Nations (2015) 2030 Agenda for Sustainable Development.'}
    ]
  },
  sdg11:{
    cat:'SDG 11 · COMMUNITIES', title:'Sustainable Cities & Communities',
    subtitle:'Target 11.2: Road safety. Target 11.7: Safe and inclusive public spaces for all.',
    color:'#2A6FD4',
    sections:[
      {label:'Relevance', text:'Rural Sri Lankan villages function as communities in every social sense — but without street lighting, they effectively cease to exist after sunset. SDG 11 calls for <strong>safe, accessible, and inclusive public spaces</strong> for all people, regardless of geography.'},
      {label:'Targets Addressed', bullets:['Target 11.2 — Improve road safety and sustainable transport access','Target 11.7 — Provide universal access to safe, inclusive, accessible green and public spaces']},
      {label:'Transformation', text:'A lit village road is not just safer — it is a <strong>social infrastructure asset</strong>. Markets can stay open. Families can gather. Children can study. Women can move freely. Our project restores night-time community life.'},
      {label:'Source', ref:'United Nations (2015) 2030 Agenda. | WHO (2021) Road Traffic Injuries. | UN Women (2017) Safe Cities and Safe Public Spaces Global Initiative.'}
    ]

const VW=1600,VH=840,CX=800,CY=420;
const LX=475,RX=1125,LS=342,RS=1258,LSUB=214,RSUB=1386;
const BY=[168,420,672],SGAP=66;
function subYs(by,n){const h=(n-1)/2;return Array.from({length:n},(_,i)=>by+(i-h)*SGAP)}
function ctb(bx,by,side){const p=90;return`M${CX},${CY} C${side==='L'?CX-p:CX+p},${CY} ${side==='L'?bx+p:bx-p},${by} ${bx},${by}`}
function curH(x1,y1,x2,y2,w){const mx=(x1+x2)/2,my=(y1+y2)/2;return`M${x1},${y1} Q${mx},${my+w} ${x2},${y2}`}
function curV(x,y1,y2,w){const my=(y1+y2)/2;return`M${x},${y1} Q${x+w},${my} ${x},${y2}`}

// SVG

const NS='http://www.w3.org/2000/svg';
const sv=document.getElementById('sv');
const cv=document.getElementById('cv');
const allSubs=[];
let activeNode=null;

function mkEl(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e}

function addPath(parent,d,color,sw,op,delay,len,fid){
  const p=mkEl('path',{d,fill:'none',stroke:color,'stroke-width':sw,'stroke-opacity':op,
    'stroke-linecap':'round','stroke-dasharray':len,'stroke-dashoffset':len,...(fid?{filter:`url(#${fid})`}:{})});
  p.style.animation=`dl .65s ${delay}s ease both`;p.style.setProperty('--d',len);
  parent.appendChild(p);return p;
}
function connector(parent,d,color,delay,isMain){
  const len=2000,gw=isMain?8:5,go=isMain?0.12:0.08,lw=isMain?1.5:0.9,lo=isMain?0.5:0.3;
  const fid=`gf-${color.replace('#','')}`;
  addPath(parent,d,color,gw,go,delay,len,fid);
  return addPath(parent,d,color,lw,lo,delay,len,null);
}
function jDot(parent,x,y,color,delay,r){
  const c=mkEl('circle',{cx:x,cy:y,r:r||3.5,fill:color,opacity:0});
  c.style.transition=`opacity .22s ${delay+0.55}s ease`;
  parent.appendChild(c);
  setTimeout(()=>c.setAttribute('opacity','0.75'),(delay+0.55)*1000);
  return c;
}
function mkNode(x,y,cls,html,delay,onclick){
  const d=document.createElement('div');
  d.className=`node ${cls} pop`;
  d.style.cssText=`left:${x}px;top:${y}px;animation-delay:${delay}s`;
  d.innerHTML=html;
  if(onclick)d.addEventListener('click',onclick);
  cv.appendChild(d);return d;
}

function buildDefs(){
  const cols=[...LEFT,...RIGHT].map(b=>b.color);
  let defs=`<defs><filter id="sketch" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="fractalNoise" baseFrequency="0.018 0.048" numOctaves="2" seed="11" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
  </filter>`;
  cols.forEach(c=>{const id=`gf-${c.replace('#','')}`;
    defs+=`<filter id="${id}" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;});
  defs+='</defs>';sv.innerHTML=defs;
}

function build(){
  cv.querySelectorAll('.node').forEach(n=>n.remove());
  sv.innerHTML='';allSubs.length=0;buildDefs();
  const cg=mkEl('g',{filter:'url(#sketch)'});sv.appendChild(cg);

  // Center
  mkNode(CX,CY,'nc',`<div class="ring"><div class="nc-lbl">Solar-Powered<br>Street Lighting</div><div class="nc-sub">Rural Sri Lanka</div></div>`,0,()=>openPanel('center',null));

  function buildSide(data,bx,spineX,subX,side){
    data.forEach((b,i)=>{
      const by=BY[i],bd=0.04+i*0.1+(side==='R'?0.04:0);
      const subs=subYs(by,b.subs.length);
      const fy=subs[0],ly=subs[subs.length-1],wob=[3,-3,3][i];
      const subEls=[];

      connector(cg,ctb(bx,by,side),b.color,bd,true);
      jDot(cg,bx,by,b.color,bd,3.5);
      connector(cg,curH(bx,by,spineX,by,wob),b.color,bd+0.16,false);
      if(subs.length>1)connector(cg,curV(spineX,fy,ly,side==='L'?-4:4),b.color,bd+0.26,false);

      subs.forEach((sy,si)=>{
        const sd=bd+0.32+si*0.07,w2=si%2===0?2:-2;
        const lp=connector(cg,curH(spineX,sy,subX,sy,w2),b.color,sd,false);
        const dp=jDot(cg,spineX,sy,b.color,sd,2.2);
        const sn=mkNode(subX,sy,'ns',`<div class="card" style="--acc:${b.color}">
          <div class="ns-name">${b.subs[si].name}</div>
          <div class="ns-det">${b.subs[si].det}</div>
        </div>`,sd,()=>openPanel(b.subs[si].id,sn));
        subEls.push({card:sn,svgEls:[lp,dp]});
      });
      allSubs.push(...subEls);

      mkNode(bx,by,'nb',`<div class="card" style="--acc:${b.color}">
        <span class="c3"></span><span class="c4"></span>
        <div class="nb-cat">${b.cat}</div>
        <div class="nb-name">${b.name}</div>
        <div class="nb-desc">${b.desc.replace('\n','<br>')}</div>
        <div class="click-hint">CLICK TO EXPLORE →</div>
      </div>`,bd,()=>openPanel(b.id,null));
    });
  }
  buildSide(LEFT,LX,LS,LSUB,'L');
  buildSide(RIGHT,RX,RS,RSUB,'R');
  addAnnotations();
}

function addAnnotations(){
  const labs=[
    {x:627,y:328,t:'ALIGNS WITH'},{x:627,y:432,t:'IMPACTS'},{x:627,y:534,t:'DRIVES'},
    {x:973,y:328,t:'ADDRESSES'},{x:973,y:432,t:'DEFINES'},{x:973,y:534,t:'DELIVERS'},
  ];
  labs.forEach(l=>{const t=mkEl('text',{x:l.x,y:l.y,'text-anchor':'middle',
    'font-family':'Share Tech Mono,monospace','font-size':'6.5',
    fill:'rgba(26,25,22,0.16)','letter-spacing':'0.1em'});t.textContent=l.t;sv.appendChild(t);});
  [[32,32],[VW-32,32],[32,VH-32],[VW-32,VH-32]].forEach(([x,y])=>{
    [[-10,0,10,0],[0,-10,0,10]].forEach(([dx1,dy1,dx2,dy2])=>{
      sv.appendChild(mkEl('line',{x1:x+dx1,y1:y+dy1,x2:x+dx2,y2:y+dy2,stroke:'rgba(26,25,22,0.14)','stroke-width':'0.75'}));});
    sv.appendChild(mkEl('circle',{cx:x,cy:y,r:3,fill:'none',stroke:'rgba(26,25,22,0.14)','stroke-width':'0.75'}));});
  sv.appendChild(mkEl('circle',{cx:CX,cy:CY,r:90,fill:'none',stroke:'rgba(26,25,22,0.07)','stroke-width':'1','stroke-dasharray':'4 9'}));
  [['REV 1.0 · CE1913 GROUP 19 · 2026',VW-36,VH-18,'end'],['DWG: OVERVIEW-01 · SCHEMATIC',VW-36,26,'end']].forEach(([txt,x,y,anc])=>{
    const t=mkEl('text',{x,y,'text-anchor':anc,'font-family':'Share Tech Mono,monospace','font-size':'7.5',fill:'rgba(26,25,22,0.15)','letter-spacing':'0.06em'});
    t.textContent=txt;sv.appendChild(t);});
}

// ═══════════════════════════════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════════════════════════════
function renderPanel(id){
  const c=CONTENT[id];if(!c)return;
  const panel=document.getElementById('panel');
  document.getElementById('panel-cat').textContent=c.cat;
  document.getElementById('panel-cat').style.color=c.color;
  document.getElementById('panel-title').textContent=c.title;
  document.getElementById('panel-title').style.color=c.color;
  document.getElementById('panel-subtitle').textContent=c.subtitle||'';
  document.getElementById('panel-accent').style.background=c.color;
  panel.style.setProperty('--panel-acc',c.color);

  let html='';
  (c.sections||[]).forEach((s,si)=>{
    html+=`<div class="pb-section fade-up" style="animation-delay:${si*0.05}s">`;
    html+=`<div class="pb-label">${s.label}</div>`;
    if(s.text)html+=`<p class="pb-text">${s.text}</p>`;
    if(s.quote)html+=`<div class="pb-quote">${s.quote}</div>`;
    if(s.bullets)html+=`<ul class="pb-bullets">${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
    if(s.stat)html+=`<div class="pb-stat"><div class="pb-stat-num" style="color:${c.color}">${s.stat.n}</div><div class="pb-stat-txt">${s.stat.t}</div></div>`;
    if(s.stats)s.stats.forEach(st=>html+=`<div class="pb-stat"><div class="pb-stat-num" style="color:${c.color}">${st.n}</div><div class="pb-stat-txt">${st.t}</div></div>`);
    if(s.chips)html+=`<div class="pb-chips">${s.chips.map(ch=>`<span class="pb-chip">${ch}</span>`).join('')}</div>`;
    if(s.subnav){
      html+=`<div class="pb-subnav">`;
      const parent=id;
      s.subnav.forEach((label,ni)=>{
        // Find sub id by matching label text loosely
        const allSubs2=[...LEFT,...RIGHT].flatMap(b=>b.subs);
        const matched=allSubs2.find(s2=>label.toLowerCase().includes(s2.name.toLowerCase().split(' ')[0].toLowerCase()));
        const subId=matched?matched.id:'';
        html+=`<button class="pb-subpill" ${subId?`onclick="openPanel('${subId}',null)"`:''}>${label}</button>`;
      });
      html+=`</div>`;
    }
    if(s.ref)html+=`<div class="pb-ref">${s.ref}</div>`;
    html+='</div>';
  });
  document.getElementById('panel-body').innerHTML=html;
  document.getElementById('panel-body').scrollTop=0;
}

function openPanel(id,nodeEl){
  if(!CONTENT[id])return;
  // Deactivate previous
  cv.querySelectorAll('.active').forEach(el=>el.classList.remove('active'));
  if(activeNode)activeNode.classList.remove('active');

  renderPanel(id);
  document.getElementById('panel').classList.add('open');
  document.getElementById('area').classList.add('panel-open');
  activeNode=nodeEl;
  if(nodeEl)nodeEl.classList.add('active');
  setTimeout(rescale,420); // gently refit after panel slides in
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('area').classList.remove('panel-open');
  cv.querySelectorAll('.active').forEach(el=>el.classList.remove('active'));
  setTimeout(rescale,420);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ZOOM + PAN
// ═══════════════════════════════════════════════════════════════════════════════
const MIN_ZOOM=0.3, MAX_ZOOM=4;
let baseScale=1, zoom=1, panX=0, panY=0;

function areaRect(){
  const panelOpen=document.getElementById('panel').classList.contains('open');
  const pw=panelOpen?420:0;
  return{w:window.innerWidth-pw, h:window.innerHeight-52-44};
}

function applyTransform(animate){
  const cv=document.getElementById('cv');
  if(animate){cv.style.transition='transform .35s cubic-bezier(.25,.8,.25,1)';setTimeout(()=>cv.style.transition='',360)}
  else cv.style.transition='';
  const s=baseScale*zoom;
  cv.style.transform=`translate(${panX}px,${panY}px) scale(${s})`;
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';
}

function fitToScreen(){
  const {w,h}=areaRect();
  baseScale=Math.min((w-24)/VW,(h-24)/VH);
  zoom=1; panX=(w-VW*baseScale)/2; panY=(h-VH*baseScale)/2;
}

function rescale(){
  // Keep the canvas centered when resizing, preserving user zoom
  const {w,h}=areaRect();
  const newBase=Math.min((w-24)/VW,(h-24)/VH);
  // Shift pan proportionally so map stays centered during resize
  const ratio=newBase/baseScale;
  panX=w/2-(w/2-panX)*ratio;
  panY=h/2-(h/2-panY)*ratio;
  baseScale=newBase;
  applyTransform(false);
}

function resetView(){fitToScreen();applyTransform(true)}

function zoomStep(factor){
  const {w,h}=areaRect();
  zoomAt(w/2,h/2,factor);
}

function zoomAt(mx,my,factor){
  const newZoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom*factor));
  if(newZoom===zoom)return;
  const s=baseScale*zoom, ns=baseScale*newZoom;
  panX=mx-(mx-panX)*(ns/s);
  panY=my-(my-panY)*(ns/s);
  zoom=newZoom;
  applyTransform(false);
}

// ── Wheel zoom ────────────────────────────────────────────────────────────────
document.getElementById('area').addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=document.getElementById('area').getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.1:0.909;
  zoomAt(mx,my,factor);
},{passive:false});

// ── Drag pan ──────────────────────────────────────────────────────────────────
let dragging=false,dsx=0,dsy=0,dpx=0,dpy=0;
const area=document.getElementById('area');
area.addEventListener('mousedown',e=>{
  if(e.target.closest('.node')||e.button!==0)return;
  dragging=true;dsx=e.clientX;dsy=e.clientY;dpx=panX;dpy=panY;
  area.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  panX=dpx+(e.clientX-dsx); panY=dpy+(e.clientY-dsy);
  applyTransform(false);
});
window.addEventListener('mouseup',()=>{dragging=false;area.classList.remove('dragging')});

// ── Touch pinch + drag ────────────────────────────────────────────────────────
let touches={},lastDist=null,lastMid=null;
area.addEventListener('touchstart',e=>{
  [...e.changedTouches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
  const pts=Object.values(touches);
  if(pts.length===2){
    lastDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    lastMid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
  }
  if(pts.length===1){dsx=pts[0].x;dsy=pts[0].y;dpx=panX;dpy=panY}
},{passive:true});
area.addEventListener('touchmove',e=>{
  e.preventDefault();
  [...e.changedTouches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
  const pts=Object.values(touches);
  if(pts.length===2&&lastDist){
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
    const rect=area.getBoundingClientRect();
    zoomAt(mid.x-rect.left,mid.y-rect.top,dist/lastDist);
    panX+=mid.x-lastMid.x; panY+=mid.y-lastMid.y;
    lastDist=dist;lastMid=mid;
    applyTransform(false);
  } else if(pts.length===1){
    panX=dpx+(pts[0].x-dsx); panY=dpy+(pts[0].y-dsy);
    applyTransform(false);
  }
},{passive:false});
area.addEventListener('touchend',e=>{
  [...e.changedTouches].forEach(t=>delete touches[t.identifier]);
  const pts=Object.values(touches);
  if(pts.length<2){lastDist=null;lastMid=null}
  if(pts.length===1){dsx=pts[0].x;dsy=pts[0].y;dpx=panX;dpy=panY}
},{passive:true});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='='||e.key==='+')zoomStep(1.2);
  if(e.key==='-'||e.key==='_')zoomStep(0.833);
  if(e.key==='0'||e.key==='f')resetView();
});

// ── Toggle ────────────────────────────────────────────────────────────────────
let on=true;
function toggle(){
  on=!on;
  allSubs.forEach(({card,svgEls})=>{
    card.classList.toggle('off',!on);
    svgEls.forEach(e=>{e.classList.add('sub-el');e.classList.toggle('off',!on)});
  });
  document.getElementById('tog-lbl').textContent=on?'Hide Details':'Show Details';
  document.getElementById('tog-ico').classList.toggle('x',!on);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  build();
  fitToScreen();
  applyTransform(false);
});
window.addEventListener('resize',()=>{clearTimeout(window._r);window._r=setTimeout(rescale,80)});
</script>
