<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illuminating the Margins — Schematic Overview</title>

<style>
@font-face{font-family:'UberMove';font-weight:300;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Light.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:400;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Regular.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:500;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Medium.woff2') format('woff2')}
@font-face{font-family:'UberMove';font-weight:700;src:url('https://d1a3f4spazzrp4.cloudfront.net/kepler.gl/uber-fonts/4.0.0/superfamily/UberMoveText-Bold.woff2') format('woff2')}
</style>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --f:  'UberMove','Manrope',sans-serif;
  --fm: 'Share Tech Mono','Courier New',monospace;
  --bg: #F8F6F0;
  --surface: #FFFFFF;
  --t1: #1A1916;
  --t2: rgba(26,25,22,0.58);
  --t3: rgba(26,25,22,0.32);
  --border: rgba(26,25,22,0.1);
  --border2: rgba(26,25,22,0.06);
}

body{
  font-family:var(--f);
  background:var(--bg);
  color:var(--t1);
  background-image:radial-gradient(circle, rgba(26,25,22,0.12) 1px, transparent 1px);
  background-size:26px 26px;
}

/* ─ Header ──────────────────────────────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:80;
  height:52px;
  background:rgba(248,246,240,0.94);
  border-bottom:1px solid rgba(26,25,22,0.1);
  backdrop-filter:blur(14px);
  display:flex;align-items:center;padding:0 24px;gap:12px;
}
.hl{font-size:12.5px;font-weight:700;letter-spacing:-0.02em;color:var(--t1);white-space:nowrap}
.hd{width:1px;height:15px;background:rgba(26,25,22,0.15);flex-shrink:0}
.hs{font-size:10px;font-weight:400;color:var(--t3);font-family:var(--fm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsp{flex:1}
#tog{
  font-family:var(--f);font-size:11px;font-weight:600;cursor:pointer;
  padding:6px 15px;border-radius:99px;white-space:nowrap;
  border:1.5px solid rgba(26,25,22,0.25);
  background:rgba(26,25,22,0.04);color:var(--t1);
  display:flex;align-items:center;gap:6px;
  transition:background .18s,border-color .18s,color .18s;user-select:none;
}
#tog:hover{background:var(--t1);color:#fff;border-color:var(--t1)}
#tog-ico{transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
#tog-ico.x{transform:rotate(45deg)}

/* ─ Map area ─────────────────────────────────────────────────────────────── */
#area{
  position:fixed;top:52px;left:0;right:0;bottom:44px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#cv{
  position:relative;
  width:1600px;height:840px;
  transform-origin:center center;
  flex-shrink:0;
}
#sv{
  position:absolute;inset:0;
  width:100%;height:100%;
  overflow:visible;pointer-events:none;z-index:1;
}

/* ─ Nodes ────────────────────────────────────────────────────────────────── */
.node{
  position:absolute;
  transform:translate(-50%,-50%);
  z-index:10;
}

/* Center */
.nc .ring{
  width:152px;height:152px;border-radius:50%;
  background:var(--t1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
  box-shadow:
    0 0 0 9px rgba(26,25,22,0.05),
    0 0 0 1px rgba(26,25,22,0.12),
    0 8px 32px rgba(26,25,22,0.18);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  cursor:default;position:relative;
}
.nc:hover .ring{transform:scale(1.05)}
.nc .ring::before{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px dashed rgba(26,25,22,0.15);pointer-events:none;
}
.nc-lbl{font-size:12px;font-weight:700;color:#fff;line-height:1.35;letter-spacing:-0.02em}
.nc-sub{font-size:7.5px;font-weight:500;color:rgba(255,255,255,0.38);
        margin-top:8px;text-transform:uppercase;letter-spacing:0.11em;font-family:var(--fm)}

/* Branch */
.nb{cursor:default}
.nb .card{
  width:150px;
  background:var(--surface);
  padding:11px 12px 12px 15px;
  position:relative;
  box-shadow:0 1px 3px rgba(26,25,22,0.07),0 4px 16px rgba(26,25,22,0.06);
}
/* 4-corner bracket marks */
.nb .card::before{content:'';position:absolute;top:-2px;left:-2px;width:9px;height:9px;
  border-top:1.5px solid var(--acc);border-left:1.5px solid var(--acc)}
.nb .card::after{content:'';position:absolute;top:-2px;right:-2px;width:9px;height:9px;
  border-top:1.5px solid var(--acc);border-right:1.5px solid var(--acc)}
.c3{position:absolute;bottom:-2px;left:-2px;width:9px;height:9px;
    border-bottom:1.5px solid var(--acc);border-left:1.5px solid var(--acc)}
.c4{position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;
    border-bottom:1.5px solid var(--acc);border-right:1.5px solid var(--acc)}
.nb-cat{font-size:7.5px;font-weight:600;color:var(--acc);text-transform:uppercase;
        letter-spacing:0.11em;margin-bottom:5px;font-family:var(--fm)}
.nb-name{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-0.02em;line-height:1.2;margin-bottom:4px}
.nb-desc{font-size:9.5px;font-weight:400;color:var(--t2);line-height:1.46}
.nb:hover .card{transform:scale(1.04);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 20px rgba(26,25,22,0.13)}

/* Sub */
.ns{cursor:default}
.ns .card{
  width:126px;
  background:var(--surface);
  padding:7px 9px 8px 11px;
  position:relative;
  box-shadow:0 1px 2px rgba(26,25,22,0.06),0 2px 8px rgba(26,25,22,0.04);
}
.ns .card::before{content:'';position:absolute;top:-2px;left:-2px;width:7px;height:7px;
  border-top:1px solid var(--acc);border-left:1px solid var(--acc);opacity:.7}
.ns .card::after{content:'';position:absolute;bottom:-2px;right:-2px;width:7px;height:7px;
  border-bottom:1px solid var(--acc);border-right:1px solid var(--acc);opacity:.7}
.ns-name{font-size:9.5px;font-weight:700;color:var(--t1);line-height:1.3}
.ns-det{font-size:8px;font-weight:400;color:var(--t3);line-height:1.35;margin-top:2px;font-family:var(--fm)}
.ns:hover .card{transform:scale(1.05);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}

/* ─ Toggle transitions ───────────────────────────────────────────────────── */
.ns,.sub-el{transition:opacity .35s ease,transform .35s cubic-bezier(.34,1.56,.64,1)}
.ns.off{opacity:0!important;pointer-events:none;transform:translate(-50%,-50%) scale(0.78)!important}
.sub-el.off{opacity:0!important}

/* ─ Entry animations ─────────────────────────────────────────────────────── */
@keyframes pop{
  from{opacity:0;transform:translate(-50%,-50%) scale(0.6)}
  to  {opacity:1;transform:translate(-50%,-50%) scale(1)}
}
.pop{opacity:0;animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
@keyframes dl{from{stroke-dashoffset:var(--d)}to{stroke-dashoffset:0}}

/* ─ Legend ────────────────────────────────────────────────────────────────── */
#leg{
  position:fixed;bottom:0;left:0;right:0;z-index:80;
  height:44px;
  background:rgba(248,246,240,0.94);
  border-top:1px solid rgba(26,25,22,0.1);
  backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;gap:20px;padding:0 20px;
}
.li{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:500;
    color:var(--t3);font-family:var(--fm);letter-spacing:0.04em;transition:color .15s}
.li:hover{color:var(--t1)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div id="hdr">
  <span class="hl">Illuminating the Margins</span>
  <div class="hd"></div>
  <span class="hs">SCHEMATIC OVERVIEW · GROUP 19 · CE1913 · Y1S1–2026 · SOLAR-POWERED STREET LIGHTING · RURAL SRI LANKA</span>
  <div class="hsp"></div>
  <button id="tog" onclick="toggle()">
    <svg id="tog-ico" width="11" height="11" viewBox="0 0 11 11" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="5.5" y1="1" x2="5.5" y2="10"/>
      <line x1="1" y1="5.5" x2="10" y2="5.5"/>
    </svg>
    <span id="tog-lbl">Hide Details</span>
  </button>
</div>

<div id="area">
  <div id="cv" style="transform: scale(0.688125); scale: 1.2;">
    <svg id="sv"></svg>
  </div>
</div>

<div id="leg">
  <div class="li"><div class="ld" style="background:#2A6FD4"></div>SDG ALIGNMENT</div>
  <div class="li"><div class="ld" style="background:#C43858"></div>PEOPLE</div>
  <div class="li"><div class="ld" style="background:#B07A10"></div>ECONOMY</div>
  <div class="li"><div class="ld" style="background:#1E8A4A"></div>ENVIRONMENT</div>
  <div class="li"><div class="ld" style="background:#7040C8"></div>PROJECT DESIGN</div>
  <div class="li"><div class="ld" style="background:#0E8878"></div>KEY BENEFITS</div>
</div>

<script>
// ── Data ───────────────────────────────────────────────────────────────────────
const LEFT = [
  {
    color:'#2A6FD4', cat:'SUSTAINABILITY', name:'SDG Alignment',
    desc:'UN 2030 Agenda\nGlobal targets',
    subs:[
      {name:'SDG 7',  det:'Clean & affordable energy'},
      {name:'SDG 11', det:'Sustainable communities'},
      {name:'SDG 13', det:'Climate action'},
    ]
  },
  {
    color:'#C43858', cat:'SOCIAL IMPACT', name:'People',
    desc:'Residents · Students\nWomen · Healthcare',
    subs:[
      {name:'Rural Residents',     det:'Safety & mobility'},
      {name:'School Children',     det:'Evening study access'},
      {name:'Women & Vulnerable',  det:'Security & freedom'},
      {name:'Healthcare Workers',  det:'Emergency response'},
    ]
  },
  {
    color:'#B07A10', cat:'ECONOMIC IMPACT', name:'Economy',
    desc:'Businesses · Local Gov\nLivelihood & finance',
    subs:[
      {name:'Small Businesses', det:'Extended trading hours'},
      {name:'Municipal Gov.',   det:'Reduced grid costs'},
    ]
  },
];

const RIGHT = [
  {
    color:'#1E8A4A', cat:'ENVIRONMENTAL', name:'Environment',
    desc:'Air · Ecosystems\nCarbon reduction',
    subs:[
      {name:'Natural Environment',  det:'CO₂ & NOx reduction'},
      {name:'Wildlife & Ecosystems',det:'Wildfire & toxin risk'},
    ]
  },
  {
    color:'#7040C8', cat:'SOLUTION', name:'Project Design',
    desc:'Off-grid LEDs\nCommunity maintained',
    subs:[
      {name:'Solar LED Units',       det:'Standalone, off-grid'},
      {name:'Community Install',     det:'Poles & basic wiring'},
      {name:'Scalable & Affordable', det:'No grid dependency'},
    ]
  },
  {
    color:'#0E8878', cat:'OUTCOMES', name:'Key Benefits',
    desc:'Evidence-backed\nstakeholder gains',
    subs:[
      {name:'Night Safety',     det:'Accident reduction'},
      {name:'Income Growth',    det:'Extended commerce'},
      {name:'Zero Emissions',   det:'Clean air & soil'},
      {name:'Better Education', det:'Lit study spaces'},
    ]
  },
];

// ── Layout ─────────────────────────────────────────────────────────────────────
const VW=1600, VH=840;
const CX=800,  CY=420;
const LX=475,  RX=1125;
const LS=342,  RS=1258;
const LSUB=214, RSUB=1386;
const BY=[168, 420, 672];
const SGAP=66;

function subYs(by,n){
  const h=(n-1)/2;
  return Array.from({length:n},(_,i)=>by+(i-h)*SGAP);
}

// Curved path from center to branch — smooth natural S-ish bezier
function centerToBranch(bx,by,side){
  const pull=90;
  const cpx1 = side==='L' ? CX-pull : CX+pull;
  const cpy1 = CY;
  // second control — pull from branch toward center horizontally
  const cpx2 = side==='L' ? bx+pull : bx-pull;
  const cpy2 = by;
  return `M${CX},${CY} C${cpx1},${cpy1} ${cpx2},${cpy2} ${bx},${by}`;
}

// Slightly curved horizontal (spine connectors get a gentle arc)
function curvedH(x1,y1,x2,y2,wobble){
  // mid control point offset perpendicular (vertical) for sketch waviness
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  return `M${x1},${y1} Q${mx},${my+wobble} ${x2},${y2}`;
}

// Curved vertical spine segment
function curvedV(x,y1,y2,wobble){
  const my=(y1+y2)/2;
  return `M${x},${y1} Q${x+wobble},${my} ${x},${y2}`;
}

// ── SVG helpers ────────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
const sv=document.getElementById('sv');
const cv=document.getElementById('cv');
const allSubs=[];

function mkEl(tag,attrs){
  const e=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}

function addPath(parent,d,color,sw,op,delay,len,filter){
  const p=mkEl('path',{
    d, fill:'none', stroke:color,
    'stroke-width':sw, 'stroke-opacity':op,
    'stroke-linecap':'round',
    'stroke-dasharray':len, 'stroke-dashoffset':len,
    ...(filter?{filter}:{})
  });
  p.style.animation=`dl .65s ${delay}s ease both`;
  p.style.setProperty('--d',len);
  parent.appendChild(p);
  return p;
}

// Two-layer connector: faint wide glow + crisp thin line
function connector(parent, d, color, delay, isMain){
  const len=2000;
  const gw = isMain ? 8 : 5;
  const go = isMain ? 0.13 : 0.09;
  const lw = isMain ? 1.5 : 0.9;
  const lo = isMain ? 0.55 : 0.35;
  const fid=`gf-${color.replace('#','')}`;
  addPath(parent,d,color,gw,go,delay,len,`url(#${fid})`);
  const lp=addPath(parent,d,color,lw,lo,delay,len,null);
  return lp;
}

function junctionDot(parent,x,y,color,delay,r){
  const c=mkEl('circle',{cx:x,cy:y,r:r||3.5,fill:color,opacity:0});
  c.style.transition=`opacity .22s ${delay+0.55}s ease`;
  parent.appendChild(c);
  requestAnimationFrame(()=>requestAnimationFrame(()=>setTimeout(()=>c.setAttribute('opacity','0.75'),(delay+0.55)*1000)));
  return c;
}

function mkNode(x,y,cls,html,delay){
  const d=document.createElement('div');
  d.className=`node ${cls} pop`;
  d.style.cssText=`left:${x}px;top:${y}px;animation-delay:${delay}s`;
  d.innerHTML=html;
  cv.appendChild(d);
  return d;
}

// ── SVG defs ───────────────────────────────────────────────────────────────────
function buildDefs(){
  const cols=[...LEFT,...RIGHT].map(b=>b.color);
  let defs=`<defs>
  <filter id="sketch" x="-4%" y="-4%" width="108%" height="108%">
    <feTurbulence type="fractalNoise" baseFrequency="0.018 0.048"
                  numOctaves="2" seed="11" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>`;
  cols.forEach(c=>{
    const id=`gf-${c.replace('#','')}`;
    defs+=`<filter id="${id}" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  });
  defs+='</defs>';
  sv.innerHTML=defs;
}

// ── Build ──────────────────────────────────────────────────────────────────────
function build(){
  cv.querySelectorAll('.node').forEach(n=>n.remove());
  sv.innerHTML='';
  allSubs.length=0;
  buildDefs();

  // All connectors go inside a group with the sketch filter
  const cg=mkEl('g',{filter:'url(#sketch)'});
  sv.appendChild(cg);

  // ── Center node ──
  mkNode(CX,CY,'nc',`<div class="ring">
    <div class="nc-lbl">Solar-Powered<br>Street Lighting</div>
    <div class="nc-sub">Rural Sri Lanka</div>
  </div>`,0);

  function buildSide(data, bx, spineX, subX, side){
    data.forEach((b,i)=>{
      const by=BY[i];
      const bd=0.04 + i*0.1 + (side==='R'?0.04:0);
      const subs=subYs(by, b.subs.length);
      const fy=subs[0], ly=subs[subs.length-1];
      const subEls=[];

      // 1. Center → branch (smooth bezier curve)
      const cd=centerToBranch(bx,by,side);
      connector(cg,cd,b.color,bd,true);
      junctionDot(cg,bx,by,b.color,bd,3.5);

      // 2. Branch → spine (gently curved horizontal)
      // Wobble direction alternates per row for organic variety
      const wob=[3,-3,3][i];
      const bSpine=curvedH(bx,by,spineX,by,wob);
      connector(cg,bSpine,b.color,bd+0.16,false);

      // 3. Spine vertical segment (curved)
      if(subs.length>1){
        const sv2=curvedV(spineX,fy,ly,(side==='L'?-4:4));
        connector(cg,sv2,b.color,bd+0.26,false);
      }

      // 4. Spine → each sub (curved horizontals)
      subs.forEach((sy,si)=>{
        const sd=bd+0.32+si*0.07;
        const w2=si%2===0?2:-2;
        const sPath=curvedH(spineX,sy,subX,sy,w2);
        const lp=connector(cg,sPath,b.color,sd,false);
        const dp=junctionDot(cg,spineX,sy,b.color,sd,2.2);

        const sn=mkNode(subX,sy,'ns',`<div class="card" style="--acc:${b.color}">
          <div class="ns-name">${b.subs[si].name}</div>
          <div class="ns-det">${b.subs[si].det}</div>
        </div>`,sd);

        subEls.push({card:sn, svgEls:[lp,dp]});
      });

      allSubs.push(...subEls);

      // 5. Branch node (rendered last so it sits on top of connectors)
      mkNode(bx,by,'nb',`<div class="card" style="--acc:${b.color}">
        <span class="c3"></span><span class="c4"></span>
        <div class="nb-cat">${b.cat}</div>
        <div class="nb-name">${b.name}</div>
        <div class="nb-desc">${b.desc.replace('\n','<br>')}</div>
      </div>`,bd);
    });
  }

  buildSide(LEFT,  LX, LS, LSUB, 'L');
  buildSide(RIGHT, RX, RS, RSUB, 'R');

  // ── Blueprint annotations ──
  addAnnotations();
}

function addAnnotations(){
  // Connector midpoint labels
  const labs=[
    {x:627,y:328,t:'ALIGNS WITH'},{x:627,y:432,t:'IMPACTS'},
    {x:627,y:534,t:'DRIVES'},
    {x:973,y:328,t:'ADDRESSES'},{x:973,y:432,t:'DEFINES'},
    {x:973,y:534,t:'DELIVERS'},
  ];
  labs.forEach(l=>{
    const t=mkEl('text',{
      x:l.x,y:l.y,'text-anchor':'middle',
      'font-family':'Share Tech Mono,monospace','font-size':'6.5',
      fill:'rgba(26,25,22,0.18)','letter-spacing':'0.1em',
    });
    t.textContent=l.t;
    sv.appendChild(t);
  });

  // Blueprint corner crosshairs
  [[32,32],[VW-32,32],[32,VH-32],[VW-32,VH-32]].forEach(([x,y])=>{
    [[-10,0,10,0],[0,-10,0,10]].forEach(([dx1,dy1,dx2,dy2])=>{
      sv.appendChild(mkEl('line',{
        x1:x+dx1,y1:y+dy1,x2:x+dx2,y2:y+dy2,
        stroke:'rgba(26,25,22,0.15)','stroke-width':'0.75'
      }));
    });
    sv.appendChild(mkEl('circle',{
      cx:x,cy:y,r:3,fill:'none',
      stroke:'rgba(26,25,22,0.15)','stroke-width':'0.75'
    }));
  });

  // Dashed annotation ring around center
  sv.appendChild(mkEl('circle',{
    cx:CX,cy:CY,r:90,fill:'none',
    stroke:'rgba(26,25,22,0.08)','stroke-width':'1','stroke-dasharray':'4 9'
  }));

  // Revision tag — bottom right
  const rt=mkEl('text',{
    x:VW-36,y:VH-18,'text-anchor':'end',
    'font-family':'Share Tech Mono,monospace','font-size':'7.5',
    fill:'rgba(26,25,22,0.18)','letter-spacing':'0.06em'
  });
  rt.textContent='REV 1.0 · CE1913 GROUP 19 · 2026';
  sv.appendChild(rt);

  // Sheet label — top right
  const sl=mkEl('text',{
    x:VW-36,y:26,'text-anchor':'end',
    'font-family':'Share Tech Mono,monospace','font-size':'7.5',
    fill:'rgba(26,25,22,0.18)','letter-spacing':'0.06em'
  });
  sl.textContent='DWG: OVERVIEW-01 · SCHEMATIC';
  sv.appendChild(sl);
}

// ── Scale ──────────────────────────────────────────────────────────────────────
function rescale(){
  const aw=window.innerWidth-16;
  const ah=window.innerHeight-52-44-12;
  const s=Math.min(aw/VW, ah/VH);
  document.getElementById('cv').style.transform=`scale(${s})`;
}

// ── Toggle ─────────────────────────────────────────────────────────────────────
let on=true;
function toggle(){
  on=!on;
  allSubs.forEach(({card,svgEls})=>{
    card.classList.toggle('off',!on);
    svgEls.forEach(e=>{e.classList.add('sub-el');e.classList.toggle('off',!on)});
  });
  document.getElementById('tog-lbl').textContent=on?'Hide Details':'Show Details';
  document.getElementById('tog-ico').classList.toggle('x',!on);
}

// ── Init ───────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{build();rescale()});
window.addEventListener('resize',()=>{clearTimeout(window._r);window._r=setTimeout(rescale,80)});
</script>
</body>
</html>
